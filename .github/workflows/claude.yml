name: Claude Code Automation

on:
  issues:
    types:
      - opened
      - assigned

  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  create-branch:
    if: >
      github.event_name == 'issues' &&
      (
        contains(github.event.issue.title, '@claude') ||
        contains(github.event.issue.body, '@claude')
      )

    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: true

      - name: Create feature branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"

          SANITIZED_TITLE=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)

          BRANCH_NAME="issue-${ISSUE_NUMBER}-${SANITIZED_TITLE}"

          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH_NAME"

          git push --set-upstream origin "$BRANCH_NAME"

          gh issue comment "$ISSUE_NUMBER" \
            --body "🌿 Branch created: \`${BRANCH_NAME}\`"

  claude:
    needs: create-branch

    if: >
      always() && (
        (
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '@claude')
        ) ||

        (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@claude')
        ) ||

        (
          github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@claude')
        ) ||

        (
          github.event_name == 'issues' &&
          (
            contains(github.event.issue.title, '@claude') ||
            contains(github.event.issue.body, '@claude')
          )
        )
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-branch.outputs.branch_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

      - name: Re-authenticate Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote set-url origin \
          "https://github-actions:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Commit Claude changes
        run: |
          git add .

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Claude automated changes"
          else
            echo "No changes to commit"
          fi

      - name: Push changes
        run: |
          BRANCH_NAME="${{ needs.create-branch.outputs.branch_name }}"

          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ needs.create-branch.outputs.branch_name }}"

          PR_EXISTS=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base dev \
            --json number \
            --jq 'length')

          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --base dev \
              --head "$BRANCH_NAME" \
              --title "🤖 Claude PR: ${BRANCH_NAME}" \
              --body "Automated PR generated by Claude Code"
          fi

      - name: Enable Auto Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ needs.create-branch.outputs.branch_name }}"

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base dev \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr merge "$PR_NUMBER" --squash --auto
          fi
